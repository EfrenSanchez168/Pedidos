<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Crema Helados</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        header { background-color: #e74c3c; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .contenedor { max-width: 1000px; margin: auto; display: flex; gap: 20px; flex-wrap: wrap; }
        #grid-principal { flex: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .boton-menu { background-color: #ffffff; border: 2px solid #e74c3c; color: #e74c3c; padding: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .boton-menu:hover { background-color: #e74c3c; color: white; }
        .tarjeta-producto { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .precio { color: #e74c3c; font-weight: bold; margin: 10px 0; }
        .btn-add { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; }
        .carrito { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-width: 280px; height: fit-content; }
        .btn-confirmar { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-volver { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Pedidos Crema Helados</h1>
    <p id="instruccion">Conectando con la base de datos...</p>
</header>

<div class="contenedor">
    <div style="flex: 2;">
        <div id="controles-nav"></div>
        <div id="grid-principal"></div>
    </div>

    <aside class="carrito">
        <h3>Tu Pedido</h3>
        <div id="items-pedido"><p>Vacío</p></div>
        <hr>
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
            <span>Total:</span>
            <span id="total-pago">$0.00</span>
        </div>
        <button class="btn-confirmar" onclick="enviarWhatsApp()">Confirmar Pedido</button>
    </aside>
</div>

<script>
    // CONFIGURACIÓN DE FIREBASE (Basada en tu captura)
    const firebaseConfig = {
        databaseURL: "https://pedidos-crema-helados-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let productosData = [];
    let miPedido = [];

    // Cargar datos reales desde Firebase
    function cargarDatos() {
        db.ref('/').once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data && data.Productos) {
                // Convertimos el objeto de Firebase en una lista fácil de usar
                productosData = Object.keys(data.Productos).map(key => ({
                    id: key,
                    ...data.Productos[key]
                }));
                mostrarCategorias(data.Categorias);
            }
        }).catch(error => {
            document.getElementById('instruccion').innerText = "Error al cargar datos.";
            console.error(error);
        });
    }

    function mostrarCategorias(categorias) {
        document.getElementById('instruccion').innerText = "Seleccione una Categoría";
        document.getElementById('controles-nav').innerHTML = "";
        const grid = document.getElementById('grid-principal');
        grid.innerHTML = "";

        // Usamos las categorías que vienen de Firebase
        Object.values(categorias).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = "boton-menu";
            btn.innerText = cat.Nombre || cat; // Ajustado según estructura Firebase
            btn.onclick = () => mostrarGrupos(cat.Nombre || cat);
            grid.appendChild(btn);
        });
    }

    function mostrarGrupos(catNombre) {
        document.getElementById('instruccion').innerText = "Seleccione un Grupo";
        const nav = document.getElementById('controles-nav');
        nav.innerHTML = `<button class="btn-volver" onclick="cargarDatos()">⬅ Volver</button>`;
        
        const grid = document.getElementById('grid-principal');
        grid.innerHTML = "";

        // Filtramos grupos únicos para esa categoría
        const grupos = [...new Set(productosData
            .filter(p => p.Categoria === catNombre)
            .map(p => p.Grupo))];

        grupos.forEach(g => {
            const btn = document.createElement('button');
            btn.className = "boton-menu";
            btn.innerText = g;
            btn.onclick = () => mostrarProductos(catNombre, g);
            grid.appendChild(btn);
        });
    }

    function mostrarProductos(catNombre, grupoNombre) {
        document.getElementById('instruccion').innerText = grupoNombre;
        const nav = document.getElementById('controles-nav');
        nav.innerHTML = `<button class="btn-volver" onclick="mostrarGrupos('${catNombre}')">⬅ Volver</button>`;
        
        const grid = document.getElementById('grid-principal');
        grid.innerHTML = "";

        const filtrados = productosData.filter(p => p.Categoria === catNombre && p.Grupo === grupoNombre);
        
        filtrados.forEach(p => {
            const card = document.createElement('div');
            card.className = "tarjeta-producto";
            card.innerHTML = `
                <div style="font-weight:bold;">${p.Nombre}</div>
                <div class="precio">$${parseFloat(p.Precio).toFixed(2)}</div>
                <button class="btn-add" onclick="agregar('${p.Nombre}', ${p.Precio})">Agregar</button>
            `;
            grid.appendChild(card);
        });
    }

    function agregar(n, p) {
        miPedido.push({ n, p });
        actualizarCarrito();
    }

    function actualizarCarrito() {
        const box = document.getElementById('items-pedido');
        const totalUI = document.getElementById('total-pago');
        box.innerHTML = miPedido.length === 0 ? "<p>Vacío</p>" : "";
        let total = 0;
        miPedido.forEach(item => {
            box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;">
                <span>${item.n}</span><b>$${item.p.toFixed(2)}</b></div>`;
            total += item.p;
        });
        totalUI.innerText = `$${total.toFixed(2)}`;
    }

    function enviarWhatsApp() {
        if (miPedido.length === 0) return alert("El carrito está vacío");
        let mensaje = "¡Hola! Quisiera realizar el siguiente pedido en Pedidos Crema Helados:\n\n";
        let total = 0;
        miPedido.forEach(item => {
            mensaje += `• ${item.n} - $${item.p.toFixed(2)}\n`;
            total += item.p;
        });
        mensaje += `\n*Total a pagar: $${total.toFixed(2)}*`;
        
        const numeroTelefono = "584142332086";
        window.open(`https://wa.me/${numeroTelefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    cargarDatos();
</script>
</body>
</html>
